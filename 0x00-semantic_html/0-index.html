<!DOCTYPE html>
<html>
  <head>
    <title>My First Semantic Page</title>
  </head>
  <body>

    <!-- Header with navigation -->
    <header>
      <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <!-- Main content -->
    <main>
      <article>
        <h1>Welcome to My Page</h1>
        <section>
          <p>This is a simple example of using semantic HTML elements to build a webpage. Keep learning!</p>
        </section>
      </article>
    </main>

    <!-- Footer -->
    <footer>
      <p>&copy; copyright</p>
    </footer>

  </body>
</html>
